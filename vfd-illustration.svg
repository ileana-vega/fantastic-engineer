<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Día del Ingeniero | Promociones CEITSA</title>
  <meta name="description" content="Landing page editable para promociones del Día del Ingeniero de CEITSA.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#contenido">Saltar al contenido</a>

  <div class="topbar">
    <div class="container topbar__inner">
      <span>Campaña especial · Día del Ingeniero</span>
      <div class="topbar__links">
        <a href="tel:+527294907147">+52 729 490 7147</a>
        <a href="mailto:atencion_ventas@ceitsa.com">atencion_ventas@ceitsa.com</a>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html" aria-label="CEITSA inicio">
        <img src="assets/logo-ceitsa.svg" alt="CEITSA Electromecatrónica">
      </a>
      <nav class="nav" data-nav aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="variadores.html">Variadores</a>
        <a href="dia-ingeniero.html" aria-current="page">Día del Ingeniero</a>
        <a href="#promociones">Promociones</a>
        <a href="#contacto">Contacto</a>
      </nav>
      <div class="header__actions">
        <a class="btn btn--primary" href="#promociones">Ver promociones</a>
        <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main id="contenido">
    <section class="section section--soft">
      <div class="container">
        <div class="banner-shell">
          <!-- Para cambiar el banner, reemplaza assets/engineer-banner.svg por tu imagen final en el mismo tamaño recomendado: 1600 x 620 px. -->
          <img src="assets/engineer-banner.svg" alt="Promociones especiales Día del Ingeniero CEITSA">
        </div>
      </div>
    </section>

    <section class="section" id="promociones">
      <div class="container">
        <div class="section-header section-header--center">
          <span class="section-kicker">Promociones vigentes</span>
          <h2>Ofertas para ingeniería, mantenimiento y automatización</h2>
          <p class="date-note">Edita estas tarjetas con precios, vigencia y condiciones reales antes de publicar.</p>
        </div>

        <div class="promo-grid">
          <!-- PROMOCIÓN 1: Cambia título, descripción, etiqueta y precio según la campaña vigente. -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Automatización</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>Paquete variador Delta + asesoría técnica</h3>
            <p>Selección de variador según datos de placa del motor, aplicación, voltaje disponible y protocolo requerido.</p>
            <ul class="check-list">
              <li>Validación de modelo compatible.</li>
              <li>Revisión de accesorios sugeridos.</li>
              <li>Soporte para parametrización inicial.</li>
            </ul>
            <div class="promo-price">
              <strong>Solicitar cotización</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="Paquete variador Delta + asesoría técnica">Cotizar</button>
            </div>
          </article>

          <!-- PROMOCIÓN 2 -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Control</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>Starter kit PLC + HMI Delta</h3>
            <p>Opción para capacitación, pruebas de programación, demostraciones internas y desarrollo de aplicaciones básicas.</p>
            <ul class="check-list">
              <li>Ideal para prácticas de automatización.</li>
              <li>Compatible con tableros didácticos.</li>
              <li>Consulta disponibilidad por modelo.</li>
            </ul>
            <div class="promo-price">
              <strong>Precio por confirmar</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="Starter kit PLC + HMI Delta">Cotizar</button>
            </div>
          </article>

          <!-- PROMOCIÓN 3 -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Sensores</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>Conectividad industrial y sensores</h3>
            <p>Promoción preparada para sensores inductivos, fotoeléctricos, conectores, cables y accesorios de instalación.</p>
            <ul class="check-list">
              <li>Equivalencias por marca y conexión.</li>
              <li>Validación de distancia, salida y voltaje.</li>
              <li>Asesoría para reemplazos urgentes.</li>
            </ul>
            <div class="promo-price">
              <strong>Solicitar lista</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="Conectividad industrial y sensores">Cotizar</button>
            </div>
          </article>

          <!-- PROMOCIÓN 4 -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Neumática</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>FRL, válvulas y conexiones neumáticas</h3>
            <p>Paquetes de mantenimiento para líneas de aire comprimido, filtros, reguladores, lubricadores, válvulas y racores.</p>
            <ul class="check-list">
              <li>Selección por caudal y conexión.</li>
              <li>Opciones SMC y accesorios compatibles.</li>
              <li>Soporte para calidad de aire.</li>
            </ul>
            <div class="promo-price">
              <strong>Desde cotización</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="FRL, válvulas y conexiones neumáticas">Cotizar</button>
            </div>
          </article>

          <!-- PROMOCIÓN 5 -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Protección</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>Protección eléctrica para tableros</h3>
            <p>Interruptores termomagnéticos, guardamotores, contactores, relevadores térmicos y accesorios de control.</p>
            <ul class="check-list">
              <li>Selección por corriente y tensión.</li>
              <li>Opciones para arranque y protección.</li>
              <li>Soporte para refaccionamiento.</li>
            </ul>
            <div class="promo-price">
              <strong>Arma tu paquete</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="Protección eléctrica para tableros">Cotizar</button>
            </div>
          </article>

          <!-- PROMOCIÓN 6 -->
          <article class="promo-card">
            <div class="promo-card__top">
              <span class="badge">Proyecto</span>
              <span class="badge">Vigente</span>
            </div>
            <h3>Diagnóstico para automatización</h3>
            <p>Espacio para campaña de revisión técnica, levantamiento de aplicación o propuesta de mejora en máquinas existentes.</p>
            <ul class="check-list">
              <li>Revisión de necesidad del cliente.</li>
              <li>Lista inicial de componentes.</li>
              <li>Propuesta de integración CEITSA.</li>
            </ul>
            <div class="promo-price">
              <strong>Agenda con asesor</strong>
              <button class="btn btn--primary" type="button" data-promo-whatsapp="Diagnóstico para automatización">Cotizar</button>
            </div>
          </article>
        </div>
      </div>
    </section>

    <section class="section section--dark" id="contacto">
      <div class="container split">
        <div class="section-header">
          <span class="section-kicker">Cómo participar</span>
          <h2>Solicita tus promociones con un asesor CEITSA.</h2>
          <p>Indica el producto requerido, cantidad, aplicación, fecha objetivo y datos de facturación para validar disponibilidad y condiciones.</p>
          <div class="section-actions">
            <a class="btn btn--primary" href="https://wa.me/5217294907147" target="_blank" rel="noopener">WhatsApp CEITSA</a>
            <a class="btn btn--secondary" href="mailto:atencion_ventas@ceitsa.com">Correo</a>
          </div>
        </div>
        <div class="feature-list">
          <article class="feature-item">
            <div class="feature-icon">1</div>
            <div><h3>Elige promoción</h3><p>Selecciona la tarjeta de la campaña y envía el mensaje por WhatsApp.</p></div>
          </article>
          <article class="feature-item">
            <div class="feature-icon">2</div>
            <div><h3>Valida la aplicación</h3><p>Un asesor confirma compatibilidad, disponibilidad y condiciones comerciales.</p></div>
          </article>
          <article class="feature-item">
            <div class="feature-icon">3</div>
            <div><h3>Recibe cotización</h3><p>Se prepara la cotización con número de parte, descripción y cantidad solicitada.</p></div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__grid">
      <div>
        <h3>CEITSA Electromecatrónica</h3>
        <p>Promociones comerciales para clientes industriales. Ajustar vigencia, inventario y condiciones antes de publicar.</p>
      </div>
      <div>
        <h4>Navegación</h4>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="variadores.html">Variadores</a></li>
          <li><a href="dia-ingeniero.html">Día del Ingeniero</a></li>
        </ul>
      </div>
      <div>
        <h4>Contacto</h4>
        <ul>
          <li>Paseo Tollocan Ote. #209, Metepec, Méx.</li>
          <li><a href="tel:+527294907147">+52 729 490 7147</a></li>
          <li><a href="mailto:atencion_ventas@ceitsa.com">atencion_ventas@ceitsa.com</a></li>
        </ul>
      </div>
    </div>
    <div class="container footer__bottom">
      <span>© <span data-year></span> CEITSA Electromecatrónica</span>
      <span>Campaña Día del Ingeniero</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
